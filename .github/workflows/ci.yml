name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:strict

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rollorian_books_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rollorian_books_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollorian_books_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollorian_books_ci?schema=public
      GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
      ROLLORIAN_DB_CONTEXT: ci-e2e-local
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx prisma generate
      - run: npm run db:guard
      - run: npx prisma db push --skip-generate
      - run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollorian_books_ci?schema=public
          ROLLORIAN_DB_CONTEXT: ci-e2e-local
          ROLLORIAN_ALLOW_DESTRUCTIVE_DB_ACTIONS: "true"
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
